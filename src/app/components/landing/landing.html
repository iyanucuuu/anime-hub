<div class="landing">
  <div class="orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="particles">
    @for (p of particles; track $index) {
      <span class="particle" [style]="p"></span>
    }
  </div>

  <div class="content">
    <div class="logo-wrap">
      <span class="torii">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="56" height="56">
          <polygon points="24,4 44,24 24,44 4,24" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <polygon points="24,12 36,24 24,36 12,24" stroke="currentColor" stroke-width="2" fill="none" opacity="0.5"/>
        </svg>
      </span>
    </div>
    <h1 class="title">
      <span class="word">Anime</span><span class="word accent">Hub</span>
    </h1>
    <p class="subtitle">Descubre, guarda y comparte tu mundo del anime</p>

    <button class="btn-enter" (click)="enter()">
      <span class="btn-text">Entrar</span>
      <span class="btn-arrow">→</span>
    </button>
  </div>

  <div class="floating-tags">
    @for (t of styledTags; track t.label) {
      <span class="tag" [style]="t.style">{{ t.label }}</span>
    }
  </div>
</div>
