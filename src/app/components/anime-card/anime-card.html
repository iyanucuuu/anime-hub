<div class="anime-card" (click)="clicked.emit(anime.mal_id)">
  <div class="card-img-wrap">
    <img [src]="anime.images?.jpg?.image_url" [alt]="anime.title" loading="lazy" />
    @if (isWatching) {
      <span class="watching-badge">▶ Ep {{ progress }}{{ totalEps ? '/' + totalEps : '' }}</span>
    }
  </div>
  <div class="card-info">
    <p class="card-title" [title]="anime.title_english || anime.title">{{ anime.title_english || anime.title }}</p>
    <p class="card-score">⭐ {{ anime.score ?? 'N/A' }}</p>
    @if (isWatching && totalEps) {
      <div class="card-progress-bar">
        <div class="card-progress-fill" [style.width.%]="progressPct"></div>
      </div>
    }
  </div>
</div>
