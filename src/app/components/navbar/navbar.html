<nav class="navbar">

  <!-- Brand -->
  <a routerLink="/" class="brand">
    <span class="brand-mark">▲</span>
    <span>Anime<span class="brand-accent">Hub</span></span>
  </a>

  <!-- Nav links -->
  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="active">Inicio</a>
    <a routerLink="/search" routerLinkActive="active">Buscar</a>
    <a routerLink="/rankings" routerLinkActive="active">Rankings</a>
    <a routerLink="/favorites" routerLinkActive="active">Favoritos</a>
    <a routerLink="/feed" routerLinkActive="active">Feed</a>
    <a routerLink="/amigos" routerLinkActive="active">
      Amigos
      @if (auth.user() && pendingRequests > 0) {
        <span class="nav-badge">{{ pendingRequests }}</span>
      }
    </a>
    <a routerLink="/account" routerLinkActive="active">Cuenta</a>
  </div>

  <!-- Controles derecha -->
  <div class="nav-controls">

    <button
      class="btn-theme"
      (click)="theme.toggle()"
      [title]="theme.theme() === 'dark' ? 'Modo claro' : 'Modo oscuro'"
    >
      @if (theme.theme() === 'dark') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    @if (auth.user()) {
      <div class="nav-user">
        <a routerLink="/account" class="nav-avatar-link" [title]="auth.user()!.displayName || 'Mi cuenta'">
          <img
            [src]="auth.user()!.photoURL || avatarFallback(auth.user()!.displayName)"
            [alt]="auth.user()!.displayName || ''"
            class="nav-avatar"
            referrerpolicy="no-referrer"
            (error)="onAvatarError($event, auth.user()!.displayName)"
          />
        </a>
        <span class="nav-name">{{ (auth.user()!.displayName || 'Usuario').split(' ')[0] }}</span>
        <button class="btn-logout" (click)="auth.logout()" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="14" height="14">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    } @else {
      <button class="btn-login" (click)="auth.loginWithGoogle()">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Entrar
      </button>
    }

  </div>
</nav>
