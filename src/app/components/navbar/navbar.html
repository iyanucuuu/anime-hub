<nav class="navbar">
  <a routerLink="/" class="brand">
    <span class="brand-mark">▲</span>
    <span>AnimeHub</span>
  </a>
  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="active">Inicio</a>
    <a routerLink="/search" routerLinkActive="active">Buscar</a>
    <a routerLink="/rankings" routerLinkActive="active">Rankings</a>
    <a routerLink="/favorites" routerLinkActive="active">Favoritos</a>
    <a routerLink="/feed" routerLinkActive="active">Feed</a>
    <a routerLink="/amigos" routerLinkActive="active" class="nav-amigos">
      Amigos
      @if (auth.user() && pendingRequests > 0) {
        <span class="nav-badge">{{ pendingRequests }}</span>
      }
    </a>
    <a routerLink="/account" routerLinkActive="active">Cuenta</a>
  </div>

  <button class="btn-theme" (click)="theme.toggle()" [title]="theme.theme() === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
    @if (theme.theme() === 'dark') {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    } @else {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    }
  </button>

  @if (auth.user()) {
    <div class="nav-user">
      <img
        [src]="auth.user()!.photoURL || avatarFallback(auth.user()!.displayName)"
        [alt]="auth.user()!.displayName || ''"
        class="nav-avatar"
        referrerpolicy="no-referrer"
        (error)="onAvatarError($event, auth.user()!.displayName)"
      />
      <button class="btn btn-ghost btn-sm" (click)="auth.logout()">Salir</button>
    </div>
  } @else {
    <button class="btn btn-primary btn-sm" (click)="auth.loginWithGoogle()">Entrar</button>
  }
</nav>
